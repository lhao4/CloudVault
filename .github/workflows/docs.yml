name: Docs

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
  pull_request:
    branches: [master, dev]
    paths:
      - "docs/**"
      - "mkdocs.yml"

jobs:
  # PR 时只构建，检查文档有无错误（不部署）
  build:
    name: Build check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install mkdocs-material

      - run: mkdocs build

  # push 到 master 才部署
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install mkdocs-material

      - run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
